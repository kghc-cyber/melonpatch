<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelonPatch | Sophisticated Freshness</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --honeydew-mist: #F8FFF8;
            --classic-honeydew: #F0FFF0;
            --rind-green: #86C28B;
            --dark-sage: #4A5C4C; /* A deeper version of your rind for luxury text */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--honeydew-mist);
            font-family: 'Inter', sans-serif;
            color: var(--dark-sage);
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            text-align: center;
            max-width: 700px;
            padding: 40px;
        }

        .logo {
            max-width: 220px;
            margin-bottom: 4rem;
            opacity: 0.9;
            /* Blends the logo subtly into the airy background */
            mix-blend-mode: multiply;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 400;
            font-style: italic;
            margin: 0 0 1.5rem 0;
            letter-spacing: -0.02em;
            color: var(--dark-sage);
        }

        .tagline {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 3rem;
            font-weight: 300;
            color: var(--rind-green);
        }

        .hints {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 4rem;
            color: var(--dark-sage);
        }

        .hints p {
            margin: 10px 0;
            opacity: 0.8;
        }

        /* Minimalist Email Entry */
        .input-group {
            position: relative;
            max-width: 400px;
            margin: 0 auto;
        }

        input[type="email"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--rind-green);
            padding: 15px 0;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            color: var(--dark-sage);
            text-align: center;
        }

        input::placeholder {
            color: var(--rind-green);
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.8rem;
        }

        button {
            background: transparent;
            border: none;
            color: var(--dark-sage);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 25px;
            cursor: pointer;
            padding: 10px;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.6;
        }

        footer {
            position: fixed;
            bottom: 40px;
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* Subtle Fade In Animation */
        .wrapper {
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="Gemini_Generated_Image_sba56vsba56vsba5.jpg" alt="MelonPatch" class="logo">
        
        <h1>stay fresh.</h1>
        <div class="tagline">An Intimate Evolution</div>

        <div class="hints">
            <p>Weightless. Invisible. Yours.</p>
            <p>The quiet confidence of a perfect layer.</p>
            <p>Coming soon to your essentials drawer.</p>
        </div>

        <div class="input-group">
            <input type="email" placeholder="Request Early Access">
            <button>Notify Me</button>
        </div>
    </div>

    <footer>Est. 2026</footer>

</body>
</html>
