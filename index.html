<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelonPatch | Stay Fresh</title>
    <style>
        :root {
            --brand-teal: #69a39b; /* Matches your logo color */
            --soft-white: #f9fbfb;
            --text-gray: #4a5553;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--soft-white);
            color: var(--text-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            width: 280px; /* Adjust based on your file */
            margin-bottom: 2rem;
            filter: drop-shadow(0 5px 15px rgba(105, 163, 155, 0.2));
        }

        .headline {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            color: var(--brand-teal);
        }

        .subtext {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-style: italic;
            opacity: 0.8;
        }

        /* Mysterious Clue Box */
        .clue-box {
            border: 1px solid rgba(105, 163, 155, 0.3);
            padding: 1.5rem;
            border-radius: 20px;
            background: white;
            margin-bottom: 2rem;
        }

        .clue-box p {
            margin: 0.5rem 0;
            font-weight: 500;
        }

        .email-signup {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        input[type="email"] {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            outline: none;
            width: 250px;
        }

        button {
            background-color: var(--brand-teal);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #568a83;
            transform: translateY(-2px);
        }

        footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="Gemini_Generated_Image_sba56vsba56vsba5.jpg" alt="MelonPatch Logo" class="logo">
        
        <div class="headline">Stay Fresh.</div>
        
        <p class="subtext">The layer you didn't know you were missing.</p>

        <div class="clue-box">
            <p>☁️ Invisible comfort.</p>
            <p>💧 Moisture-wicking magic.</p>
            <p>🤫 Your best kept secret.</p>
        </div>

        <div class="email-signup">
            <input type="email" placeholder="Enter your email...">
            <button>Get Early Access</button>
        </div>
    </div>

    <footer>Coming Soon</footer>

</body>
</html>
