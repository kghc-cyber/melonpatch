<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelonPatch | Stay Fresh. Stay You.</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --honeydew-mist: #F8FFF8;
            --rind-green: #86C28B;
            --dark-sage: #4A5C4C;
            --sprout-green: #B9FFA3;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--honeydew-mist);
            font-family: 'Inter', sans-serif;
            color: var(--dark-sage);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 40px 20px;
            opacity: 0;
            animation: luxuryFadeIn 2.5s ease-out forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 2rem;
            mix-blend-mode: multiply; 
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 8vw, 3.8rem);
            font-weight: 400;
            font-style: italic;
            margin: 0;
            color: var(--dark-sage);
            line-height: 1.2;
        }

        .tagline {
            font-size: 0.75rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--rind-green);
            margin: 0.5rem 0 2rem 0;
        }

        .clues {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            line-height: 2;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .email-section {
            width: 100%;
            max-width: 320px;
            min-height: 120px; /* Prevents layout jump after submission */
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        input[type="email"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--rind-green);
            padding: 12px 0;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            color: var(--dark-sage);
        }

        button {
            background: transparent;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.75rem;
            margin-top: 15px;
            cursor: pointer;
            color: var(--rind-green);
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover { color: var(--dark-sage); letter-spacing: 0.35em; }

        /* Thank You Message Styling */
        #status {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            margin-top: 20px;
            color: var(--rind-green);
            display: none; /* Hidden by default */
        }

        @keyframes luxuryFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--rind-green);
            opacity: 0.4;
        }

        @media (max-height: 700px) {
            .container { padding-top: 60px; padding-bottom: 100px; }
            footer { position: relative; margin-top: 40px; bottom: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="MelonPatch" class="logo">
        
        <div>
            <h1>Stay Fresh. Stay You.</h1>
            <div class="tagline">An Intimate Evolution</div>
        </div>

        <div class="clues">
            <p>Weightless moisture protection.</p>
            <p>Designed for your closest layers.</p>
            <p>Coming 2026.</p>
        </div>

        <div class="email-section">
            <form id="contact-form" action="https://formspree.io/f/xkoqkybk" method="POST">
                <input type="email" name="email" id="email" placeholder="YOUR EMAIL ADDRESS" required>
                <button type="submit" id="submit-btn">Join the Inner Circle</button>
            </form>
            <div id="status">Thank you for joining.</div>
        </div>
    </div>

    <footer>Est. 2026</footer>

    <script>
        const form = document.getElementById("contact-form");
        const status = document.getElementById("status");
        const submitBtn = document.getElementById("submit-btn");

        form.addEventListener("submit", async function(event) {
            event.preventDefault();
            submitBtn.innerText = "SENDING...";
            
            const data = new FormData(event.target);
            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    form.style.display = "none";
                    status.style.display = "block";
                } else {
                    submitBtn.innerText = "ERROR. TRY AGAIN.";
                }
            }).catch(error => {
                submitBtn.innerText = "ERROR. TRY AGAIN.";
            });
        });
    </script>

</body>
</html>
