<body>

    <header>
        <img src="logo.png" alt="MELONPATCH" class="logo">
    </header>

    <div class="container">
        <h1>Stay Fresh. Stay You.</h1>
        <div class="tagline">An Intimate Evolution</div>

        <div class="clues">
            <p>Weightless moisture protection.</p>
            <p>Designed for your closest layers.</p>
            <p>Coming 2026.</p>
        </div>

        <div class="email-section">
            <form id="contact-form" action="https://formspree.io/f/xkoqkybk" method="POST">
                <input type="email" name="email" id="email" placeholder="YOUR EMAIL ADDRESS" required>
                <button type="submit" id="submit-btn">Join the Inner Circle</button>
            </form>
            <div id="status">Thank you for joining.</div>
            
            <div style="margin-top: 40px;">
                <a href="reviews.html" style="text-decoration: none; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.3em; font-size: 0.65rem; color: var(--rind-green); opacity: 0.7;">
                    The Sample Circle
                </a>
            </div>
        </div>
    </div>

    <footer>Est. 2026</footer>

    <script>
        const form = document.getElementById("contact-form");
        const status = document.getElementById("status");
        const submitBtn = document.getElementById("submit-btn");

        form.addEventListener("submit", function(event) {
            event.preventDefault();
            submitBtn.innerText = "SENDING...";
            
            const data = new FormData(event.target);
            fetch(event.target.action, {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    form.style.display = "none";
                    status.style.display = "block";
                } else {
                    submitBtn.innerText = "ERROR. TRY AGAIN.";
                }
            }).catch(error => {
                submitBtn.innerText = "ERROR. TRY AGAIN.";
            });
        });
    </script>
</body>
