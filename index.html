<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelonPatch | Stay Fresh. Stay You.</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --honeydew-mist: #F8FFF8;
            --rind-green: #86C28B;
            --dark-sage: #4A5C4C;
            --sprout-green: #B9FFA3;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background-color: var(--honeydew-mist);
            font-family: 'Inter', sans-serif;
            color: var(--dark-sage);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 60px 0 30px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Logo Styling - Prevents "Broken" look if file is missing */
        .logo-container {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--dark-sage);
        }

        .logo-img {
            max-width: 180px;
            height: auto;
            display: block;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            flex: 1 0 auto; /* Pushes footer down */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            opacity: 0;
            animation: luxuryFadeIn 1.5s ease-out forwards;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(2.2rem, 8vw, 3.8rem);
            margin: 0;
            line-height: 1.1;
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 0.7rem;
            color: var(--rind-green);
            margin-bottom: 2rem;
        }

        .clues {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 2.5rem;
            opacity: 0.85;
        }

        .clues p { margin: 8px 0; }

        .email-section {
            width: 100%;
            max-width: 320px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        input[type="email"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(134, 194, 139, 0.4);
            padding: 12px 0;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            outline: none;
            color: var(--dark-sage);
            transition: border-color 0.3s;
        }

        input[type="email"]:focus {
            border-bottom: 1px solid var(--rind-green);
        }

        input::placeholder {
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.65rem;
            opacity: 0.6;
        }

        button {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--rind-green);
            padding-bottom: 4px;
            cursor: pointer;
            color: var(--rind-green);
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            color: var(--dark-sage);
            border-bottom-color: var(--dark-sage);
            letter-spacing: 0.35em;
        }

        #status {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            margin-top: 20px;
            color: var(--rind-green);
            display: none;
        }

        footer {
            flex-shrink: 0;
            padding: 60px 0;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 0.65rem;
            color: var(--rind-green);
            opacity: 0.5;
        }

        @keyframes luxuryFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="MelonPatch" class="logo-img" onerror="this.style.display='none'; this.parentElement.innerHTML='MelonPatch';">
        </div>
