<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelonPatch | Stay Fresh. Stay You.</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --honeydew-mist: #F8FFF8;
            --rind-green: #86C28B;
            --dark-sage: #4A5C4C;
            --sprout-green: #B9FFA3;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--honeydew-mist);
            font-family: 'Inter', sans-serif;
            color: var(--dark-sage);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Changed from height to min-height for mobile safety */
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 40px 20px;
            opacity: 0;
            animation: luxuryFadeIn 2.5s ease-out forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem; /* Consistent spacing between all elements */
        }

        .logo {
            max-width: 220px;
            height: auto;
            margin-bottom: 2rem;
            mix-blend-mode: multiply; 
        }

        .text-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 8vw, 3.8rem);
            font-weight: 400;
            font-style: italic;
            margin: 0;
            color: var(--dark-sage);
            line-height: 1.2;
        }

        .tagline {
            font-size: 0.75rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--rind-green);
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        .clues {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            line-height: 2;
            margin-bottom: 3rem;
            opacity: 0.9;
        }

        .clues p {
            margin: 8px 0;
        }

        .email-section {
            width: 100%;
            max-width: 320px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        input[type="email"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--rind-green);
            padding: 12px 0;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            color: var(--dark-sage);
            transition: border-color 0.4s ease;
        }

        input[type="email"]:focus {
            border-bottom: 1px solid var(--sprout-green);
        }

        button {
            background: transparent;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.75rem;
            margin-top: 15px;
            cursor: pointer;
            color: var(--rind-green);
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover {
            color: var(--dark-sage);
            letter-spacing: 0.35em;
            transform: translateY(-2px);
        }

        @keyframes luxuryFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--rind-green);
            opacity: 0.4;
        }

        /* Mobile specific adjustments to prevent text overlap */
        @media (max-height: 700px) {
            .container { padding-top: 60px; padding-bottom: 100px; }
            footer { position: relative; margin-top: 40px; bottom: 0; }
            body { height: auto; overflow-y: auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="MelonPatch" class="logo">
        
        <div class="text-group">
            <h1>Stay Fresh. Stay You.</h1>
            <div class="tagline">An Intimate Evolution</div>
        </div>

        <div class="clues">
            <p>Weightless moisture protection.</p>
            <p>Designed for your closest layers.</p>
            <p>Coming 2026.</p>
        </div>

        <div class="email-section">
            <form action="https://formspree.io/f/xkoqkybk" method="POST">
                <input type="email" name="email" placeholder="YOUR EMAIL ADDRESS" required>
                <input type="text" name="_gotcha" style="display:none">
                <button type="submit">Join the Inner Circle</button>
            </form>
        </div>
    </div>

    <footer>Est. 2026</footer>

</body>
</html>
