<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelonPatch | Stay Fresh</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --honeydew-mist: #F8FFF8;
            --rind-green: #86C28B;
            --dark-sage: #4A5C4C;
            --sprout-green: #B9FFA3;
        }

        body {
            margin: 0;
            background-color: var(--honeydew-mist);
            font-family: 'Inter', sans-serif;
            color: var(--dark-sage);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            opacity: 0;
            animation: luxuryFadeIn 2.5s ease-out forwards;
        }

        .logo-wrapper {
            margin-bottom: 3rem;
        }

        .logo {
            max-width: 200px;
            height: auto;
            /* This helps blend the logo into your honeydew background */
            mix-blend-mode: multiply; 
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-weight: 400;
            font-style: italic;
            margin: 0;
            color: var(--dark-sage);
        }

        .tagline {
            font-size: 0.7rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--rind-green);
            margin-bottom: 3.5rem;
            margin-top: 0.5rem;
        }

        .clues {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            line-height: 2.2;
            margin-bottom: 4rem;
            font-style: normal;
        }

        .email-section {
            max-width: 300px;
            margin: 0 auto;
        }

        input[type="email"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--rind-green);
            padding: 10px 0;
            text-align: center;
            font-family: 'Inter', sans-serif;
            outline: none;
            color: var(--dark-sage);
        }

        button {
            background: transparent;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.7rem;
            margin-top: 20px;
            cursor: pointer;
            color: var(--rind-green);
            font-weight: 600;
        }

        @keyframes luxuryFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.6rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--rind-green);
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-wrapper">
            <img src="https://raw.githubusercontent.com/kghc-cyber/melonpatch/main/melonpatch-logo.png" 
                 alt="MelonPatch" 
                 class="logo"
                 onerror="this.src='https://kghc-cyber.github.io/melonpatch/melonpatch-logo.png'">
        </div>
        
        <h1>stay fresh.</h1>
        <div class="tagline">An Intimate Evolution</div>

        <div class="clues">
            <p>Weightless moisture protection.</p>
            <p>Designed for your closest layers.</p>
            <p>Confidence, redefined.</p>
        </div>

        <div class="email-section">
            <input type="email" placeholder="JOIN THE LIST">
            <button>Notify Me</button>
        </div>
    </div>

    <footer>Est. 2026</footer>

</body>
</html>
