<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelonPatch | Stay Fresh</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --honeydew-mist: #F8FFF8;
            --rind-green: #86C28B;
            --dark-sage: #4A5C4C;
            --sprout-green: #B9FFA3;
        }

        body {
            margin: 0;
            background-color: var(--honeydew-mist);
            font-family: 'Inter', sans-serif;
            color: var(--dark-sage);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .content {
            text-align: center;
            opacity: 0;
            animation: fadeIn 2.5s ease-out forwards;
            max-width: 600px;
            padding: 20px;
        }

        .logo {
            max-width: 220px;
            margin-bottom: 3.5rem;
            /* Ensures a clean look if there's any stray background in the PNG */
            mix-blend-mode: multiply;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            font-weight: 400;
            font-style: italic;
            margin: 0 0 0.5rem 0;
            color: var(--dark-sage);
            letter-spacing: -0.01em;
        }

        .tagline {
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-size: 0.7rem;
            color: var(--rind-green);
            margin-bottom: 4rem;
            font-weight: 400;
        }

        .clues {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            line-height: 2.2;
            margin-bottom: 4.5rem;
            font-style: normal;
            opacity: 0.85;
        }

        .email-capture {
            max-width: 300px;
            margin: 0 auto;
        }

        input[type="email"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--rind-green);
            padding: 12px 0;
            text-align: center;
            font-family: 'Inter', sans-serif;
            outline: none;
            color: var(--dark-sage);
            font-size: 0.9rem;
            transition: border-color 0.4s;
        }

        input[type="email"]:focus {
            border-bottom: 1px solid var(--sprout-green);
        }

        button {
            background: transparent;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.7rem;
            margin-top: 25px;
            cursor: pointer;
            color: var(--rind-green);
            font-weight: 600;
            transition: color 0.3s;
        }

        button:hover {
            color: var(--dark-sage);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.65rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--rind-green);
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="content">
        <img src="melonpatch-logo.png" alt="MelonPatch" class="logo">
        
        <h1>stay fresh.</h1>
        <div class="tagline">The Invisible Essential</div>

        <div class="clues">
            <p>A weightless embrace for your closest layers.</p>
            <p>Invisible moisture protection, designed by women.</p>
            <p>The quiet confidence of all-day comfort.</p>
        </div>

        <div class="email-capture">
            <input type="email" placeholder="JOIN THE LIST">
            <button>Notify Me</button>
        </div>
    </div>

    <footer>Coming 2026</footer>

</body>
</html>
