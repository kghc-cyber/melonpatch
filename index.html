<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelonPatch | Stay Fresh. Stay You.</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <meta property="og:title" content="MelonPatch | Stay Fresh. Stay You.">
    <meta property="og:description" content="An Intimate Evolution. Weightless moisture protection designed for your closest layers.">
    <meta property="og:image" content="logo.png">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --honeydew-mist: #F8FFF8;
            --rind-green: #86C28B;
            --dark-sage: #4A5C4C;
            --sprout-green: #B9FFA3;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--honeydew-mist);
            font-family: 'Inter', sans-serif;
            color: var(--dark-sage);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 50px 0 20px 0;
            display: flex;
            justify-content: center;
        }

        .logo {
            max-width: 180px;
            height: auto;
            mix-blend-mode: multiply; 
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            opacity: 0;
            animation: luxuryFadeIn 2.5s ease-out forwards;
        }

        /* Consistent Serif Style */
        h1, .clues, #status {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
        }

        h1 {
            font-size: clamp(2.2rem, 8vw, 3.8rem);
            margin: 0;
            line-height: 1.1;
        }

        /* Consistent Sans-Serif Caps Style */
        .tagline, button, footer, input::placeholder {
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 0.7rem;
        }

        .tagline {
            color: var(--rind-green);
            margin-bottom: 2rem;
        }

        .clues {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 2.5rem;
            opacity: 0.85;
        }

        .clues p {
            margin: 4px 0;
        }

        .email-section {
            width: 100%;
            max-width: 300px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        input[type="email"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--rind-green);
            padding: 10px 0;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            outline: none;
            color: var(--dark-sage);
        }

        button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--rind-green);
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            color: var(--dark-sage);
            letter-spacing: 0.45em;
        }

        #status {
            font-size: 1.2rem;
            margin-top: 20px;
            color: var(--rind-green);
            display: none;
        }

        @keyframes luxuryFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: auto;
            padding: 50px 0;
            color: var(--rind-green);
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="MELONPATCH" class="logo">
    </header>

    <div class="container">
        <h1>Stay Fresh. Stay You.</h1>
        <div class="tagline">An Intimate Evolution</div>

        <div class="clues">
            <p>Weightless moisture protection.</p>
            <p>Designed for your closest layers.</p>
            <p>Coming 2026.</p>
        </div>

        <div class="email-section">
            <form id="contact-form" action="https://formspree.io/f/xkoqkybk" method="POST">
                <input type="email" name="email" id="email" placeholder="YOUR EMAIL ADDRESS" required>
                <button type="submit" id="submit-btn">Join the Inner Circle</button>
            </form>
            <div id="status">Thank you for joining.</div>
        </div>
    </div>

    <footer>Est. 2026</footer>

    <script>
        const form = document.getElementById("contact-form");
        const status = document.getElementById("status");
        const submitBtn = document.getElementById("submit-btn");

        form.addEventListener("submit", async function(event) {
            event.preventDefault();
            submitBtn.innerText = "SENDING...";
            
            const data = new FormData(event.target);
            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    form.style.display = "none";
                    status.style.display = "block";
                } else {
                    submitBtn.innerText = "ERROR. TRY AGAIN.";
                }
            }).catch(error => {
                submitBtn.innerText = "ERROR. TRY AGAIN.";
            });
        });
    </script>

</body>
</html>
